name: 'Dawnland Launcher Release'
run-name: 'Release ${{ github.ref_name }}'

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    environment: release
    env:
      VITE_WEB_BACKEND_URL: ${{ vars.VITE_WEB_BACKEND_URL }}
      LAUNCHER_API_SECRET: ${{ secrets.LAUNCHER_API_SECRET }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Windows task -> Route to Windows machine
          - platform: 'windows-x86_64'
            runner: [ 'self-hosted', 'Windows' ] # Must match the label set on Windows node
            args: ''

          # 2. Linux task -> Route to NAS
          - platform: 'ubuntu-22_04'
            runner: [ 'self-hosted', 'Linux' ]   # Must match the label set in Docker compose
            args: ''

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Update version based on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Extract version exactly from refs/tags/v1.0.0
            const version = context.ref.replace('refs/tags/v', '');
            console.log(`Setting version to ${version}`);
            
            // Export VERSION to GITHUB_ENV for the final exe upload step
            core.exportVariable('VERSION', version);
            
            // 1. Update package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = version;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            
            // 2. Update tauri.conf.json
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            tauri.version = version;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
            
            // 3. Update Cargo.toml
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version\s*=\s*".*?"/m, `version = "${version}"`);
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);

      # Note: fixed platform match name
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22_04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      # 1. Official plugin for Mac and Linux nodes (skipping Windows)
      - name: Install Rust (Mac & Linux)
        if: matrix.platform != 'windows-x86_64'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-aarch64' && 'aarch64-apple-darwin' || matrix.platform == 'macos-x86_64' && 'x86_64-apple-darwin' || '' }}

      # 2. For Windows node: Smart detect and install Rust
      - name: Install Rust (Windows Self-Hosted)
        if: matrix.platform == 'windows-x86_64'
        shell: powershell
        run: |
          # Smart detect: skip download if cargo already exists in the system
          if (Get-Command cargo -ErrorAction SilentlyContinue) {
            Write-Host "🎉 Perfect! Rust environment already exists on local Windows, skipping installation!"
            cargo --version
          } else {
            Write-Host "Rust not detected, starting automatic download and installation of rustup-init.exe..."
            Invoke-WebRequest -Uri https://win.rustup.rs/ -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile default
          }

          # Key directive: always inject PATH to GitHub environment to ensure cargo is found
          Write-Host "Injecting Cargo PATH into current GitHub workflow..."
          echo "${env:USERPROFILE}\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          tagName: v__VERSION__
          releaseName: 'Dawnland Launcher v__VERSION__'
          releaseBody: '🚀 **Dawnland Launcher Update**\n\nSee the assets below to download this version and install.'
          releaseDraft: true
          prerelease: false
          uploadPlainBinary: true
          args: ${{ matrix.args }}

      - name: Package and Sign Portable Executable for Updater
        if: matrix.platform == 'windows-x86_64' && startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: powershell
        run: |
          $exePath = "src-tauri/target/release/DLML.exe"
          $zipName = "DLML_portable_v${{ env.VERSION }}.zip"
          
          Write-Host "Packaging portable update: $zipName"
          python -c "import zipfile; z = zipfile.ZipFile('$zipName', 'w', compression=zipfile.ZIP_STORED); z.write('$exePath', 'DLML.exe'); z.close()"
          
          Write-Host "Generating Tauri signature for portable update..."
          pnpm tauri signer sign $zipName
          
          Write-Host "Uploading native exe, portable update package and its signature to Release..."
          gh release upload "v${{ env.VERSION }}" $exePath $zipName "$zipName.sig" --clobber
          
      - name: Upload Release Artifacts to Cloudflare R2
        if: matrix.platform == 'windows-x86_64' && startsWith(github.ref, 'refs/tags/v')
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          VERSION: ${{ env.VERSION }}
        run: node .github/scripts/upload_to_r2.js