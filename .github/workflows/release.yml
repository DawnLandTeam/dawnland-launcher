name: 'Dawnland Launcher Release'
run-name: 'Release ${{ github.ref_name }}'

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Windows task -> Route to Windows machine
          - platform: 'windows-x86_64'
            runner: [ 'self-hosted', 'Windows' ] # Must match the label set on Windows node
            args: ''

          # 2. Linux task -> Route to NAS
          - platform: 'ubuntu-22_04'
            runner: [ 'self-hosted', 'Linux' ]   # Must match the label set in Docker compose
            args: ''

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Update version based on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            // Extract version exactly from refs/tags/v1.0.0
            const version = context.ref.replace('refs/tags/v', '');
            console.log(`Setting version to ${version}`);
            
            // Export VERSION to GITHUB_ENV for the final exe upload step
            core.exportVariable('VERSION', version);
            
            // 1. Update package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = version;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            
            // 2. Update tauri.conf.json
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            tauri.version = version;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2) + '\n');
            
            // 3. Update Cargo.toml
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version\s*=\s*".*?"/m, `version = "${version}"`);
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);

      # Note: fixed platform match name
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22_04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libfuse2 file wget

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      # 1. Official plugin for Mac and Linux nodes (skipping Windows)
      - name: Install Rust (Mac & Linux)
        if: matrix.platform != 'windows-x86_64'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform == 'macos-aarch64' && 'aarch64-apple-darwin' || matrix.platform == 'macos-x86_64' && 'x86_64-apple-darwin' || '' }}

      # 2. For Windows node: Smart detect and install Rust
      - name: Install Rust (Windows Self-Hosted)
        if: matrix.platform == 'windows-x86_64'
        shell: powershell
        run: |
          # Smart detect: skip download if cargo already exists in the system
          if (Get-Command cargo -ErrorAction SilentlyContinue) {
            Write-Host "🎉 Perfect! Rust environment already exists on local Windows, skipping installation!"
            cargo --version
          } else {
            Write-Host "Rust not detected, starting automatic download and installation of rustup-init.exe..."
            Invoke-WebRequest -Uri https://win.rustup.rs/ -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile default
          }

          # Key directive: always inject PATH to GitHub environment to ensure cargo is found
          Write-Host "Injecting Cargo PATH into current GitHub workflow..."
          echo "${env:USERPROFILE}\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Rust cache
        uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri App
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # VITE_WEB_BACKEND_URL is sourced from vars because it's public/environment-specific configuration
          VITE_WEB_BACKEND_URL: ${{ vars.VITE_WEB_BACKEND_URL }}
          # LAUNCHER_API_SECRET and APTABASE_KEY are sourced from secrets because they are sensitive credentials
          LAUNCHER_API_SECRET: ${{ secrets.LAUNCHER_API_SECRET }}
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
          APTABASE_URL: ${{ secrets.APTABASE_URL }}
        run: pnpm tauri build ${{ matrix.args }}

      - name: Check if release exists
        id: check_release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            try {
              const version = context.ref.replace('refs/tags/', '');
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
              } else {
                throw error;
              }
            }

      - name: Create GitHub Release and Upload Artifacts
        if: startsWith(github.ref, 'refs/tags/v') && steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: 'Dawnland Launcher v${{ env.VERSION }}'
          draft: true
          prerelease: false
          body: '🚀 **Dawnland Launcher Update**\n\nSee the assets below to download this version and install.'
          files: |
            src-tauri/target/release/DLML.exe
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Artifacts to Existing GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.check_release.outputs.exists == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            src-tauri/target/release/DLML.exe
            src-tauri/target/release/bundle/appimage/*.AppImage


      - name: Upload Release Artifacts to Cloudflare R2
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          VERSION: ${{ env.VERSION }}
        run: node .github/scripts/upload_to_r2.js