name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-rust:
    name: Rust Backend Tests
    runs-on: [ 'self-hosted', 'Windows' ]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (Windows Self-Hosted)
        shell: powershell
        run: |
          if (Get-Command cargo -ErrorAction SilentlyContinue) {
            Write-Host "🎉 Perfect! Rust environment already exists on local Windows, skipping installation!"
            cargo --version
          } else {
            Write-Host "Rust not detected, starting automatic download and installation of rustup-init.exe..."
            Invoke-WebRequest -Uri https://win.rustup.rs/ -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile default
          }
          Write-Host "Injecting Cargo PATH into current GitHub workflow..."
          echo "${env:USERPROFILE}\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run Cargo Tests
        working-directory: ./src-tauri
        run: cargo test

  test-frontend:
    name: Vue Frontend Tests
    runs-on: [ 'self-hosted', 'Linux' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Install dependencies
        run: pnpm install
      - name: Run Vitest
        run: pnpm run test

  test-e2e:
    name: End-to-End Tests
    runs-on: [ 'self-hosted', 'Linux' ]
    needs: [test-rust, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Install Dependencies
        run: pnpm install
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright E2E
        run: pnpm run e2e
