name: Test

on:
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-rust:
    name: Rust Backend Tests
    runs-on: [ 'self-hosted', 'Windows' ]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (Windows Self-Hosted)
        shell: powershell
        run: |
          if (Get-Command cargo -ErrorAction SilentlyContinue) {
            Write-Host "🎉 Perfect! Rust environment already exists on local Windows, skipping installation!"
            cargo --version
          } else {
            Write-Host "Rust not detected, starting automatic download and installation of rustup-init.exe..."
            Invoke-WebRequest -Uri https://win.rustup.rs/ -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile default
          }
          Write-Host "Injecting Cargo PATH into current GitHub workflow..."
          echo "${env:USERPROFILE}\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run Cargo Tests and Strict Clippy
        working-directory: ./src-tauri
        run: |
          cargo test
          cargo clippy --all-targets --all-features -- -D warnings

  test-frontend:
    name: Vue Frontend Tests
    runs-on: [ 'self-hosted', 'Linux' ]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: pnpm install
      - name: Run Vitest
        run: pnpm run test

  test-e2e:
    name: End-to-End Tests
    runs-on: [ 'self-hosted', 'Linux' ]
    needs: [test-rust, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 11
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
      - name: Install Dependencies
        run: pnpm install
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright E2E
        run: pnpm run e2e
