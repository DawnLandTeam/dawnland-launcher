name: 'PR Build Test'

on:
  pull_request:
    branches:
      - '**'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Windows 任务 -> 路由给 Windows 机器
          - platform: 'windows-x86_64'
            runner: [ 'self-hosted', 'Windows' ] # 必须匹配你在 Windows 节点设置的 Label
            args: ''

          # 2. Linux 任务 -> 路由给 NAS
          - platform: 'linux-x86_64'
            runner: [ 'self-hosted', 'Linux' ]   # 必须匹配你在 Docker compose 里设置的 Label
            args: ''

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin, x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Frontend Compilation
        run: pnpm run build

      - name: Check Backend Compilation
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml
